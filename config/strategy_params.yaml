        max: 40
        min: 10
        type: int
      price_increase_threshold:
        default: 0.08
        description: 当日涨幅需要超过此值
        display_name: 涨幅阈值(%)
        group: 放量反弹条件
        max: 0.15
        min: 0.05
        type: float
