  check_interval: 60
  max_position_size: 0.1
  max_positions: 10
  min_position_size: 0.01
  min_score: 70
  preload:
    days: 5
    enabled: true
    exclude_recent_days: 0
  selection_limit: 20
  stop_loss_threshold: -0.05
  take_profit_threshold: 0.21
  trading:
    commission_rate: 0.00015
    min_commission: 5
    slippage:
      buy_slippage: 0.01
      enabled: true
      sell_slippage: 0.005
    stamp_tax_rate: 0.001
    transfer_fee_rate: 1.0e-05
  working_hour: 9
  working_minute: 30
