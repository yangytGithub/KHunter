        default: 10
        description: 成交量均值计算周期
        display_name: 成交量周期
        group: 放量反弹条件
        max: 20
        min: 5
        type: int
      volume_ratio_threshold:
        default: 2.5
        description: 当日成交量需要是成交量均值的此倍数以上
        display_name: 成交量倍数
        group: 放量反弹条件
        max: 5.0
        min: 1.5
        type: float
