        max: 0.6
        min: 0.3
        type: float
      lookback_days:
        default: 120
        description: 回溯天数，用于寻找最高点和最低点
        display_name: 回溯天数
        group: 深度下跌条件
        max: 250
        min: 60
        type: int
      macd_divergence_days:
        default: 20
        description: MACD底背离时间窗口
        display_name: 底背离窗口
